# Example freshy configuration. Copy to ~/.config/freshy/config.toml
# and edit. See README.md for the full schema.

config_version = 1

[settings]
# systemd-style duration for the periodic timer.
schedule     = "6h"
parallel     = 4
log_path     = "~/.local/share/freshy/logs/freshy.log"
install_to   = "~/.local/bin"
prune_builds = true

# Each [[packages]] entry declares one tool to keep fresh.
# `installer` is a path to a LOCAL shell script you own — it runs with
# cwd = repo root, so it can read sources / run make / cargo install.
# `binaries` is what `installer` is expected to produce inside the
# repo; those files are atomically copied into `settings.install_to`.

# ripgrep ships a scripts/install.sh. We keep that file in our local
# installer dir, then point freshy at it.
[[packages]]
name      = "ripgrep"
repo      = "https://github.com/BurntSushi/ripgrep.git"
branch    = "master"
installer = "~/.local/share/freshy/installers/ripgrep.sh"
binaries  = ["rg"]

